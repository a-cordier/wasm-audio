version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    assignees:
      - "a-cordier"
    reviewers:
      - "a-cordier"
    labels:
      - "npm"
      - "dependencies"
    commit-message:
      prefix: ":arrow_up:"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
