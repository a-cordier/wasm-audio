name: Build
on:
  push:
    branches:
      - master
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup emsdk
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 6.0.2
      - name: verify
        run: make -v && emcc -v
      - name: install and build
        run: |
          npm install
          npm run build

      - name: deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
