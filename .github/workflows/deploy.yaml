name: Deploy to GitHub Pages
on:
  push:
    branches:
      - master

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: setup emsdk
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: 6.0.2

      - name: verify
        run: make -v && emcc -v

      - name: compile wasm
        run: |
          DSP=src/dsp
          EMCC_FLAGS="-std=c++17 -O3 -g0 -sINITIAL_MEMORY=4MB -sWASM_ASYNC_COMPILATION=0 -sSINGLE_FILE=1 -sEXPORT_ES6=1 -sMODULARIZE=1 -sENVIRONMENT=worklet -I $DSP"

          ENGINE=src/instruments/poly-ticks/engine
          emcc $EMCC_FLAGS \
            -sEXPORTED_FUNCTIONS="['_malloc','_free','_voice_kernel_create','_voice_kernel_destroy','_voice_kernel_process','_voice_kernel_set_parameters','_voice_kernel_enter_release_stage','_voice_kernel_is_stopped','_voice_kernel_reset','_synth_engine_create','_synth_engine_destroy','_synth_engine_note_on','_synth_engine_note_off','_synth_engine_set_param','_synth_engine_process']" \
            -sEXPORTED_RUNTIME_METHODS="['HEAPF32','HEAPU32']" \
            -I $ENGINE \
            $ENGINE/voice-kernel.cpp \
            -o $ENGINE/voice-kernel.wasmmodule.js

          MONOLOG=src/instruments/monolog/engine
          emcc $EMCC_FLAGS \
            -sEXPORTED_FUNCTIONS="['_malloc','_free','_monolog_create','_monolog_destroy','_monolog_note_on','_monolog_note_off','_monolog_set_param','_monolog_process']" \
            -sEXPORTED_RUNTIME_METHODS="['HEAPF32','HEAPU32']" \
            -I $MONOLOG \
            $MONOLOG/monolog-kernel.cpp \
            -o $MONOLOG/monolog-kernel.wasmmodule.js

      - name: install and build
        run: |
          npm ci
          npx vite build

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: deploy
        id: deploy
        uses: actions/deploy-pages@v4
